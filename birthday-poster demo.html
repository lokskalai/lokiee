<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Birthday Poster Generator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-rgb: 99, 102, 241;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;

            animation: fadeInDown 1s ease-out;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        header h1 span {
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: flex;
            gap: 4rem;
            width: 100%;
            max-width: 1200px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Form Styling */
        .form-section {
            flex: 1;
            min-width: 320px;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            height: fit-content;
            animation: fadeInLeft 1s ease-out;
        }

        .form-section h2 {
            font-size: 1.75rem;
            margin-bottom: 2rem;
            color: white;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.6rem;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 1rem;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(var(--primary-rgb), 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Poster Preview */
        .poster-section {
            flex: 1.2;
            min-width: 350px;
            display: flex;
            justify-content: center;
            perspective: 1000px;
            animation: fadeInRight 1s ease-out;
        }

        .poster {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 3 / 4;
            background: white;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .poster:hover {
            transform: translateY(-15px) rotateX(4deg) rotateY(2deg);
        }

        .poster-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3.5rem;
            color: #0f172a;
        }

        .poster-bg {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .poster-bg-gradient {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(255, 255, 255, 0.9), transparent),
                radial-gradient(circle at bottom left, rgba(var(--primary-rgb), 0.15), transparent);
        }

        .poster-decoration {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .balloon {
            position: absolute;
            width: 45px;
            height: 55px;
            background: var(--primary);
            border-radius: 50%;
            z-index: 5;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 2px;
            height: 25px;
            background: rgba(0, 0, 0, 0.05);
        }

        .happy-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            font-style: italic;
        }

        .name-text {
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 0.9;
            margin-bottom: 2rem;
            color: #0f172a;
            word-break: break-word;
        }

        .age-badge {
            width: 110px;
            height: 110px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            margin-bottom: 2.5rem;
            box-shadow: 0 15px 30px -10px rgba(var(--primary-rgb), 0.5);
            border: 4px solid white;
        }

        .age-num {
            font-size: 2.8rem;
            line-height: 1;
        }

        .age-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .message-text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #475569;
            font-style: italic;
            max-width: 100%;
        }

        .confetti-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }

        /* Animations */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-25px) rotate(6deg);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 850px) {
            .container {
                gap: 2rem;
            }

            header h1 {
                font-size: 2.5rem;
            }
        }

        .download-btn {
            margin-top: 2rem;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px -10px rgba(var(--primary-rgb), 0.5);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px rgba(var(--primary-rgb), 0.6);
        }
    </style>
</head>

<body>

    <header>
        <h1>Birthday <span>Poster</span></h1>
        <p>Enter details below to generate your custom poster</p>
    </header>

    <div class="container">
        <div class="form-section">
            <h2>Customize</h2>

            <div class="form-group">
                <label>Name</label>
                <input type="text" id="nameInput" value="Alex Smith" placeholder="Enter name">
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" id="ageInput" value="21" placeholder="Enter age">
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea id="messageInput" rows="3"
                    placeholder="Enter a sweet message">Wishing you a day filled with magic and joy!</textarea>
            </div>

            <div class="form-group">
                <label>Theme Color</label>
                <input type="color" id="colorInput" value="#6366f1">
            </div>

            <button class="download-btn" onclick="window.print()">Save as PDF / Print</button>
        </div>

        <div class="poster-section">
            <div class="poster" id="poster">
                <div class="poster-bg">
                    <div class="poster-bg-gradient"></div>
                    <div class="poster-decoration" id="decorations"></div>
                </div>

                <canvas id="confetti" class="confetti-canvas"></canvas>

                <div class="poster-content">
                    <div class="happy-text">Happy Birthday</div>
                    <h2 class="name-text" id="nameDisplay">Alex Smith</h2>

                    <div class="age-badge" id="ageBadge">
                        <span class="age-num" id="ageDisplay">21</span>
                        <span class="age-label">Years Old</span>
                    </div>

                    <p class="message-text" id="messageDisplay">
                        "Wishing you a day filled with magic and joy!"
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const nameInput = document.getElementById('nameInput');
        const ageInput = document.getElementById('ageInput');
        const messageInput = document.getElementById('messageInput');
        const colorInput = document.getElementById('colorInput');

        const nameDisplay = document.getElementById('nameDisplay');
        const ageDisplay = document.getElementById('ageDisplay');
        const messageDisplay = document.getElementById('messageDisplay');
        const ageBadge = document.getElementById('ageBadge');
        const decorations = document.getElementById('decorations');

        function updatePoster() {
            nameDisplay.textContent = nameInput.value || "Your Name";
            ageDisplay.textContent = ageInput.value || "0";
            messageDisplay.textContent = `"${messageInput.value || "Have a great day!"}"`;

            const color = colorInput.value;
            document.documentElement.style.setProperty('--primary', color);

            // Convert hex to rgb for opacity variants
            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const b = parseInt(color.slice(5, 7), 16);
            document.documentElement.style.setProperty('--primary-rgb', `${r}, ${g}, ${b}`);
        }

        [nameInput, ageInput, messageInput, colorInput].forEach(input => {
            input.addEventListener('input', updatePoster);
        });

        // Add balloons
        function createBalloons() {
            decorations.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.style.left = (Math.random() * 80 + 10) + '%';
                balloon.style.top = (Math.random() * 20 + 5) + '%';
                balloon.style.animationDelay = (Math.random() * 2) + 's';
                balloon.style.transform = `scale(${0.8 + Math.random() * 0.5})`;
                balloon.style.opacity = 0.6 + Math.random() * 0.4;
                decorations.appendChild(balloon);
            }
        }

        // Simple Confetti
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 6 + 4;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                this.velocity = { x: (Math.random() - 0.5) * 2, y: Math.random() * 2 + 1 };
                this.rotation = Math.random() * 360;
            }
            update() {
                this.y += this.velocity.y;
                this.x += this.velocity.x;
                this.rotation += 2;
                if (this.y > canvas.height) this.y = -10;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function initConfetti() {
            particles = Array.from({ length: 60 }, () => new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        initConfetti();
        animate();
        createBalloons();
        updatePoster();
    </script>
</body>

</html>
